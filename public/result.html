<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的灵魂画像 - SurveyKit</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="result.css">
</head>
<body>
    <div class="bg-layer">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>
        <canvas id="star-canvas"></canvas>
    </div>

    <header class="nav">
        <a href="index.html" class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="currentColor" stroke-width="2"/><path d="M10 16l4 4 8-8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
            <span>SurveyKit</span>
        </a>
        <div id="status-bar" class="status-bar">
            <i class="fas fa-spinner fa-spin"></i>
            <span>正在解析你的灵魂信号...</span>
        </div>
    </header>

    <main class="main">
        <!-- HERO: SVG Character + Personality Tag -->
        <section id="hero-section" class="hero reveal" style="display:none;">
            <div class="hero-glow"></div>
            <div id="character-stage" class="character-stage">
                <svg id="character-svg" viewBox="0 0 300 320" width="280" height="300"></svg>
                <div class="character-shadow"></div>
            </div>
            <div class="hero-text">
                <div class="personality-badge" id="personality-badge"></div>
                <h1 class="personality-title" id="personality-title"></h1>
                <p class="personality-subtitle" id="personality-subtitle"></p>
                <div class="personality-traits" id="personality-traits"></div>
            </div>
        </section>

        <!-- RADAR CHART -->
        <section id="radar-section" class="radar-section reveal" style="display:none;">
            <div class="card glass-card">
                <div class="card-head">
                    <i class="fas fa-chart-pie card-icon"></i>
                    <h3>人格维度雷达图</h3>
                </div>
                <div class="radar-container">
                    <canvas id="radar-canvas" width="400" height="400"></canvas>
                    <div class="radar-legend" id="radar-legend"></div>
                </div>
            </div>
        </section>

        <!-- EGG / EASTER EGG -->
        <section id="egg-section" class="egg-section reveal" style="display:none;">
            <div class="card glass-card egg-card">
                <div class="egg-icon">🥚</div>
                <p id="egg-text" class="egg-text"></p>
                <button id="reroll-egg-btn" class="btn-ghost">
                    <i class="fas fa-dice-d6"></i> 再开一个彩蛋
                </button>
            </div>
        </section>

        <!-- ACTIONS -->
        <section id="actions-section" class="actions-section reveal" style="display:none;">
            <div class="card glass-card">
                <div class="card-head">
                    <i class="fas fa-file-signature card-icon"></i>
                    <h3>你的问卷档案</h3>
                </div>
                <div class="link-box">
                    <div class="link-label"><i class="fas fa-key"></i> 专属时空信标</div>
                    <div class="link-row">
                        <code id="exclusive-survey-link"></code>
                        <button id="copy-exclusive-link-btn" class="btn-icon" title="复制链接"><i class="fas fa-copy"></i></button>
                    </div>
                    <p class="link-hint">此信标包含密钥，是你返回此地的唯一凭证，请妥善保管。</p>
                </div>
                <div class="btn-group">
                    <button id="viewMySubmissionBtn" class="btn btn-primary"><i class="fas fa-eye"></i> 查看完整提交</button>
                    <button id="goToMbtiAnalysisBtn" class="btn btn-accent"><i class="fas fa-brain"></i> 启动深度人格分析</button>
                </div>
            </div>

            <div class="card glass-card">
                <div class="card-head">
                    <i class="fas fa-handshake card-icon"></i>
                    <h3>默契度大挑战</h3>
                </div>
                <p class="card-desc">输入另一位时空旅人的信标，看看你们的灵魂契合度！</p>
                <div class="compare-form">
                    <input type="text" id="compareLinkInput" placeholder="在此粘贴对方的信标链接...">
                    <button id="startCompareBtn" class="btn btn-primary btn-sm">开始同步</button>
                </div>
                <button id="generateCompareLinkBtn" class="btn-ghost"><i class="fas fa-link"></i> 生成我的对比信标</button>
            </div>
        </section>

        <a href="index.html" class="back-link reveal" style="display:none;" id="back-link">
            <i class="fas fa-chevron-left"></i> 返回母舰，开启新的探索
        </a>
    </main>

    <script src="result.js"></script>
</body>
</html>
